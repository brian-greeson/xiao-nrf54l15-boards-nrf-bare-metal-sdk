board:
  name: bm_xiao_softdevice
  full_name: Bare Metal XIAO nRF54L15 SoftDevice
  vendor: seeed
  socs:
    - name: nrf54l15
      variants:
        - name: s115_softdevice
          cpucluster: cpuapp
runners:
  run_once:
    '--recover':
      - runners:
          - nrfjprog
          - nrfutil
        run: first
        groups:
          - boards:
              - bm_xiao_softdevice/nrf54l15/cpuapp/s115_softdevice
    '--erase':
      - runners:
          - nrfjprog
          - jlink
          - nrfutil
        run: first
        groups:
          - boards:
              - bm_xiao_softdevice/nrf54l15/cpuapp/s115_softdevice
    '--reset':
      - runners:
          - nrfjprog
          - jlink
          - nrfutil
        run: last
        groups:
          - boards:
              - bm_xiao_softdevice/nrf54l15/cpuapp/s115_softdevice
